<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dylan's Job Box — Mockup Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #1a1a1a; }
  .tabbar {
    display: flex; align-items: center; gap: 6px; padding: 10px 14px;
    background: #111; border-bottom: 2px solid #333; flex-wrap: wrap;
  }
  .tabbar .label { color: #888; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-right: 8px; }
  .tabbar button {
    border: 1px solid #444; background: #222; color: #ccc;
    padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;
    transition: all .15s;
  }
  .tabbar button:hover { background: #333; color: #fff; }
  .tabbar button.active { background: #ffb703; border-color: #ffb703; color: #111; }
  .tabbar button.pick { border-color: #ffb703; color: #ffb703; }
  .tabbar button.pick.active { color: #111; }
  iframe { flex: 1; width: 100%; border: none; background: #fff; }
</style>
</head>
<body>
  <div class="tabbar">
    <span class="label">Dylan's Job Box — Mockups</span>
    <button class="active" data-src="mockup1.html">1 · Classic Handyman</button>
    <button data-src="mockup2.html">2 · Bold &amp; Playful</button>
    <button data-src="mockup3.html">3 · Clean Minimal</button>
    <button data-src="mockup4.html">4 · Toolbox Rustic</button>
    <button data-src="mockup5.html">5 · Dark Pro</button>
    <button data-src="mockup6.html">6 · Neighbourhood Flyer</button>
    <button data-src="mockup7.html">7 · Photo Contractor</button>
    <button data-src="mockup8.html">8 · Booking-First</button>
    <button class="pick" data-src="template.html">★ Dylan's Pick — Variants</button>
  </div>
  <iframe id="frame" src="mockup1.html"></iframe>
<script>
  const frame = document.getElementById('frame');
  document.querySelectorAll('.tabbar button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tabbar button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      frame.src = btn.dataset.src;
    });
  });
</script>
</body>
</html>
